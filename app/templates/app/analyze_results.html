<!-- templates/app/analyze_results.html -->
{% extends "app/base.html" %}
{% block content %}
  <h2>Analysis Results</h2>
  <table class="table">
    <thead>
      <tr><th>Bundle</th><th>Script</th><th>Result</th></tr>
    </thead>
    <tbody>
      {% for row in results %}
        <tr>
          <td>{{ row.bundle }}</td>
          <td>{{ row.script }}</td>
          <td>{{ row.result }}</td>
        </tr>
      {% endfor %}
    </tbody>
  </table>
  <a href="{% url 'bundle_list' %}" class="btn btn-secondary">Back to list</a>
{% endblock %}
