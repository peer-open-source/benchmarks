{% regroup results by bundle as bundle_list %}
{% for group in bundle_list %}
  <div class="card mb-3">
    <div class="card-header">{{ group.grouper }}</div>
    <ul class="list-group list-group-flush">
      {% for row in group.list %}
        <li class="list-group-item d-flex justify-content-between">
          <code>{{ row.script }}</code>
          {% if "Error" in row.result %}
            <span class="badge bg-danger">{{ row.result }}</span>
          {% else %}
            <span class="badge bg-success">{{ row.result }}</span>
          {% endif %}
        </li>
      {% endfor %}
    </ul>
  </div>
{% endfor %}
